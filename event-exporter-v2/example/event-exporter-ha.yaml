# HA (High Availability) deployment of event-exporter.
# Uses shared-nothing consistent hashing: each pod watches all events
# but only sends events it "owns" (hash partitioned) to Cloud Logging.
# Scale with HPA for higher throughput.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: event-exporter-sa
    namespace: default
---
# Headless Service for peer discovery.
# Each pod discovers other pods via the Endpoints of this Service.
apiVersion: v1
kind: Service
metadata:
  name: event-exporter-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    app: event-exporter
  ports:
    - name: metrics
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-exporter
  template:
    metadata:
      labels:
        app: event-exporter
    spec:
      serviceAccountName: event-exporter-sa
      containers:
        - name: event-exporter
          image: gcr.io/google-containers/event-exporter:v0.5.11
          command:
            - '/event-exporter'
            - '--headless-service-name=event-exporter-headless'
          ports:
            - name: metrics
              containerPort: 80
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /readyz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /readyz
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# PodDisruptionBudget to ensure at least 2 pods are always available.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-exporter-pdb
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: event-exporter
---
# HorizontalPodAutoscaler based on custom metrics.
# Requires Prometheus Adapter to expose event_exporter_queue_depth
# as a custom metric to the Kubernetes metrics API.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: event-exporter-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: event-exporter
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: event_exporter_queue_depth
        target:
          type: AverageValue
          averageValue: "400"
